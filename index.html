<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Question for Amiwa</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background-color: #fce4ec;
      font-family: 'Courier New', Courier, monospace;
      overflow: hidden;
      text-align: center;
      transition: background-color 0.5s;
    }

    #main-content {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Centers the image and keeps it a nice size */
    #amiwaImage {
      width: 280px;
      border-radius: 20px;
      margin-bottom: 20px;
      border: 4px solid white;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    h1 {
      color: #333;
      margin-bottom: 30px;
    }

    .buttons {
      display: flex;
      gap: 20px;
      justify-content: center;
      align-items: center;
      min-height: 100px;
      width: 100%;
      position: relative;
    }

    button {
      padding: 15px 35px;
      font-size: 1.2rem;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      z-index: 10;
      font-weight: bold;
    }

    #yesBtn {
      background-color: #4CAF50;
      color: white;
      transition: 0.1s;
    }

    #noBtn {
      background-color: #ff4d4d;
      color: white;
      transition: 0.2s all ease;
    }

    .success-content {
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    #roastImage {
      max-width: 320px;
      border-radius: 10px;
      border: 5px solid white;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>
  <div id="main-content">
    <img id="amiwaImage" src="amiwa.jpg" alt="Amiwa">

    <h1>Amiwa, will you be my Valentine?</h1>

    <div class="buttons" id="buttonContainer">
      <button id="yesBtn">Yes</button>
      <button id="noBtn" onclick="accepted()">No</button>
    </div>
  </div>

  <div id="success-content" class="success-content">
    <img id="roastImage" src="amiwa.jpg" alt="Roast Image">
    <h1 style="color: #d32f2f; font-size: 3.5rem; margin: 0;">WOMP</h1>
    <p style="font-size: 1.5rem; font-weight: bold; padding: 0 20px; color: #fff;">
      you gonna die alone cause you so goddamn ugly u femboy
    </p>
  </div>

  <script>
    const yesBtn = document.getElementById('yesBtn');
    const noBtn = document.getElementById('noBtn');
    const mainContent = document.getElementById('main-content');
    const successContent = document.getElementById('success-content');

    let noSize = 1;
    let yesAttempts = 0;
    let activated = false;

    const moveYes = () => {
      // Toggle to absolute positioning only when the "chase" begins
      if (!activated) {
        activated = true;
        yesBtn.style.position = 'absolute';
      }

      // Random position calculation
      const x = Math.random() * (window.innerWidth - yesBtn.offsetWidth);
      const y = Math.random() * (window.innerHeight - yesBtn.offsetHeight);

      yesBtn.style.left = `${x}px`;
      yesBtn.style.top = `${y}px`;

      yesAttempts++;
      noSize += 0.8; // Grow faster for more "pressure"
      noBtn.style.transform = `scale(${noSize})`;
    };

    yesBtn.addEventListener('mouseover', moveYes);
    yesBtn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      moveYes();
    });

    function accepted() {
      if (yesAttempts < 5) {
        alert("Nice try 😌 click the green one first");
        return;
      }
      mainContent.style.display = 'none';
      successContent.style.display = 'flex';
      document.body.style.backgroundColor = '#000';
    }
  </script>
</body>
</html>
