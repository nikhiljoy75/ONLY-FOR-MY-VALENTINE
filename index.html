<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Amiwa</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Arial', sans-serif;
            background-color: #ffe6e6;
            overflow: hidden;
            text-align: center;
        }

        #main-container {
            transition: opacity 0.5s ease;
        }

        img {
            width: 300px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        h1 {
            color: #d63384;
            margin-bottom: 30px;
        }

        .btn-container {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.1s;
        }

        #yes-btn {
            background-color: #28a745;
            color: white;
            position: absolute; /* Allows it to jump around */
            z-index: 1000;
        }

        #no-btn {
            background-color: #dc3545;
            color: white;
        }

        .womp-screen {
            display: none;
            background-color: black;
            color: white;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 9999;
        }

        .womp-text {
            font-size: 3rem;
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="main-container">
        <img src="amiwa.jpg" alt="Amiwa">
        <h1>Amiwa, will you be my Valentine?</h1>

        <div class="btn-container">
            <button id="yes-btn">Yes</button>
            <button id="no-btn">No</button>
        </div>
    </div>

    <div id="fail-screen" class="womp-screen">
        <p class="womp-text">WOMP you don't have a valentine you ugly fuck</p>
    </div>

    <script>
        const yesBtn = document.getElementById('yes-btn');
        const noBtn = document.getElementById('no-btn');
        const mainContainer = document.getElementById('main-container');
        const failScreen = document.getElementById('fail-screen');

        let yesHoverCount = 0;

        // 1. Logic to make the Yes button jump away
        yesBtn.addEventListener('mouseenter', () => {
            yesHoverCount++;
            
            // Generate random coordinates
            const x = Math.random() * (window.innerWidth - yesBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - yesBtn.offsetHeight);
            
            yesBtn.style.left = `${x}px`;
            yesBtn.style.top = `${y}px`;
        });

        // 2. Logic for the No button
        noBtn.addEventListener('click', () => {
            if (yesHoverCount < 3) {
                alert("Don't be shy, press the green 'Yes' button at least 3 times first.");
            } else {
                // Show the Womp screen
                mainContainer.style.display = 'none';
                failScreen.style.display = 'flex';
            }
        });

        // Prevent clicking Yes even if they are super fast
        yesBtn.addEventListener('click', (e) => {
            e.preventDefault();
        });
    </script>
</body>
</html>
