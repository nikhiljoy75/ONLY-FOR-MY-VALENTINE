<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Question for Amiwa</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background-color: #fce4ec;
      font-family: 'Courier New', Courier, monospace;
      overflow: hidden;
      text-align: center;
    }

    #main-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      height: 100%;
      justify-content: center;
    }

    #amiwaImage {
      width: 280px;
      border-radius: 20px;
      margin-bottom: 20px;
      border: 4px solid white;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    .button-container {
      position: relative;
      width: 100%;
      height: 300px; /* Space for buttons to move */
    }

    button {
      padding: 15px 35px;
      font-size: 1.2rem;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
      position: absolute; /* Both buttons need absolute to move */
      transition: transform 0.1s ease-out;
    }

    /* "Yes" starts on the left */
    #yesBtn {
      background-color: #4CAF50;
      color: white;
      left: 35%;
      z-index: 10; 
    }

    /* "No" starts on the right, higher Z-index to cover "Yes" */
    #noBtn {
      background-color: #ff4d4d;
      color: white;
      right: 35%;
      z-index: 100; 
    }

    .success-content {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2000;
      background-color: black;
    }

    #roastImage {
      max-width: 320px;
      border: 5px solid white;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>
  <div id="main-content">
    <img id="amiwaImage" src="amiwa.jpg" alt="Amiwa">
    <h1>Amiwa, will you be my Valentine?</h1>

    <div class="button-container">
      <button id="yesBtn">Yes</button>
      <button id="noBtn" onclick="accepted()">No</button>
    </div>
  </div>

  <div id="success-content" class="success-content">
    <img id="roastImage" src="amiwa.jpg" alt="Roast Image">
    <h1 style="color: #d32f2f; font-size: 3.5rem; margin: 0;">WOMP</h1>
    <p style="font-size: 1.5rem; font-weight: bold; padding: 0 20px; color: #fff;">
      you gonna die alone cause you so goddamn ugly u femboy
    </p>
  </div>

  <script>
    const yesBtn = document.getElementById('yesBtn');
    const noBtn = document.getElementById('noBtn');
    const successContent = document.getElementById('success-content');

    let noScale = 1;
    let attempts = 0;

    const moveButtons = () => {
      // Get random positions within the viewport
      const pad = 100;
      const x1 = Math.random() * (window.innerWidth - pad);
      const y1 = Math.random() * (window.innerHeight - pad);
      const x2 = Math.random() * (window.innerWidth - pad);
      const y2 = Math.random() * (window.innerHeight - pad);

      // Move Yes
      yesBtn.style.left = `${x1}px`;
      yesBtn.style.top = `${y1}px`;

      // Move No
      noBtn.style.left = `${x2}px`;
      noBtn.style.top = `${y2}px`;

      // Grow No button
      noScale += 0.8; 
      noBtn.style.transform = `scale(${noScale})`;
      
      attempts++;
    };

    // Trigger movement when hovering over YES
    yesBtn.addEventListener('mouseover', moveButtons);
    
    // Also trigger if they try to touch it on mobile
    yesBtn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      moveButtons();
    });

    function accepted() {
      // Require at least some chaos before allowing the click
      if (attempts < 3) {
        alert("Wait, you haven't even tried to click 'Yes' yet!");
        return;
      }
      successContent.style.display = 'flex';
    }
  </script>
</body>
</html>
