<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A Question for Amiwa</title>

  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background-color: #fce4ec;
      font-family: "Courier New", Courier, monospace;
      overflow: hidden;
      text-align: center;
    }

    #main-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      height: 100%;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
    }

    #amiwaImage {
      width: 280px;
      border-radius: 20px;
      margin-bottom: 18px;
      border: 4px solid white;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
    }

    /* BUTTON AREA */
    .button-container {
      width: min(650px, 92vw);
      height: 260px; /* space for movement later */
      margin-top: 14px;
      position: relative;
    }

    /* Start state: buttons are in a flex row and always visible */
    .button-row {
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 18px;
      position: absolute;
      top: 20px;
      left: 0;
    }

    button {
      padding: 15px 35px;
      font-size: 1.2rem;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    #yesBtn {
      background-color: #4caf50;
      color: white;
    }

    #noBtn {
      background-color: #ff4d4d;
      color: white;
    }

    /* After we “activate chaos”, we switch buttons to absolute */
    .chaos button {
      position: absolute;
      top: 20px;
      left: 20px;
      transition: transform 0.12s ease-out, left 0.12s ease-out, top 0.12s ease-out;
    }

    #hint {
      margin-top: 10px;
      font-weight: bold;
      font-size: 1rem;
      color: #6a1b9a;
      min-height: 1.2em;
    }

    .success-content {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: fixed;
      inset: 0;
      z-index: 2000;
      background-color: black;
      text-align: center;
      padding: 20px;
      box-sizing: border-box;
    }

    #roastImage {
      max-width: 320px;
      width: 80vw;
      border: 5px solid white;
      border-radius: 18px;
      margin-bottom: 18px;
    }
  </style>
</head>

<body>
  <div id="main-content">
    <img id="amiwaImage" src="amiwa.jpg" alt="Amiwa" />
    <h1>Amiwa, will you be my Valentine?</h1>

    <div class="button-container" id="btnArea">
      <div class="button-row" id="buttonRow">
        <button id="yesBtn">Yes</button>
        <button id="noBtn">No</button>
      </div>
    </div>

    <div id="hint"></div>
  </div>

  <div id="success-content" class="success-content">
    <img id="roastImage" src="amiwa.jpg" alt="Amiwa" />
    <h1 style="color: #ff4d4d; font-size: 3rem; margin: 0;">
