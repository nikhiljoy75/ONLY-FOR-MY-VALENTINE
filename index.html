<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Question for Amiwa</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background-color: #fce4ec;
      font-family: 'Courier New', Courier, monospace;
      overflow: hidden;
      text-align: center;
    }

    #main-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    /* Centered Main Image */
    #amiwaImage {
      width: 280px;
      border-radius: 20px;
      margin-bottom: 20px;
      border: 4px solid white;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    h1 {
      color: #333;
      margin: 10px 0 30px 0;
    }

    /* Side-by-side initial container */
    .button-container {
      display: flex;
      gap: 20px;
      justify-content: center;
      align-items: center;
      width: 100%;
      min-height: 150px;
      position: relative;
    }

    button {
      padding: 15px 35px;
      font-size: 1.2rem;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
    }

    /* High Z-index keeps Yes on top of the growing No */
    #yesBtn {
      background-color: #4CAF50;
      color: white;
      z-index: 999; 
      transition: transform 0.1s ease;
    }

    #noBtn {
      background-color: #ff4d4d;
      color: white;
      z-index: 10;
      transition: 0.2s all ease;
    }

    .success-content {
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    #roastImage {
      max-width: 320px;
      border-radius: 10px;
      border: 5px solid white;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>
  <div id="main-content">
    <img id="amiwaImage" src="amiwa.jpg" alt="Amiwa">

    <h1>Amiwa, will you be my Valentine?</h1>

    <div class="button-container">
      <button id="yesBtn">Yes</button>
      <button id="noBtn" onclick="accepted()">No</button>
    </div>
  </div>

  <div id="success-content" class="success-content">
    <img id="roastImage" src="amiwa.jpg" alt="Roast Image">
    <h1 style="color: #d32f2f; font-size: 3.5rem; margin: 0;">WOMP</h1>
    <p style="font-size: 1.5rem; font-weight: bold; padding: 0 20px; color: #fff;">
      you gonna die alone cause you so goddamn ugly u femboy
    </p>
  </div>

  <script>
    const yesBtn = document.getElementById('yesBtn');
    const noBtn = document.getElementById('noBtn');
    const mainContent = document.getElementById('main-content');
    const successContent = document.getElementById('success-content');

    let noSize = 1;
    let yesAttempts = 0;
    let isMoving = false;

    const moveYes = () => {
      // Switch to absolute only when she tries to click it
      if (!isMoving) {
        isMoving = true;
        yesBtn.style.position = 'absolute';
      }

      // Keep it within window bounds
      const x = Math.random() * (window.innerWidth - yesBtn.offsetWidth);
      const y = Math.random() * (window.innerHeight - yesBtn.offsetHeight);

      yesBtn.style.left = `${x}px`;
      yesBtn.style.top = `${y}px`;

      yesAttempts++;
      // Red button grows
      noSize += 0.7;
      noBtn.style.transform = `scale(${noSize})`;
    };

    yesBtn.addEventListener('mouseover', moveYes);
    yesBtn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      moveYes();
    });

    function accepted() {
      if (yesAttempts < 5) {
        alert("Nice try 😌 click the green one first");
        return;
      }
      mainContent.style.display = 'none';
      successContent.style.display = 'flex';
      document.body.style.backgroundColor = '#000';
    }
  </script>
</body>
</html>
