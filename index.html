<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Very Serious Question</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        #gifDisplay {
            width: 250px;
            border-radius: 10px;
            z-index: 1;
        }

        h1 {
            color: #333;
            z-index: 1;
        }

        .buttons {
            margin-top: 50px;
        }

        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            z-index: 10;
        }

        /* The button that runs away */
        #yesBtn {
            background-color: #4CAF50;
            color: white;
            position: absolute;
            transition: 0.1s ease;
        }

        /* The button that grows */
        #noBtn {
            background-color: #ff4d4d;
            color: white;
            position: relative;
            transition: 0.3s all ease-in-out;
        }

        .success-content {
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="main-content">
        <img id="gifDisplay" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHpueG56ZnBndGZueW56ZnBndGZueW56ZnBndGZueW56ZnBndGZueSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/qUIm586OT5SK4/giphy.gif">
        <h1>Will you be my Valentine?</h1>
        
        <div class="buttons">
            <button id="yesBtn">Yes</button>
            <button id="noBtn" onclick="accepted()">No</button>
        </div>
    </div>

    <div id="success-content" class="success-content">
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM2I4bm56ZnBndGZueW56ZnBndGZueW56ZnBndGZueW56ZnBndGZueSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/l0MYt5jPR6QX5pnqM/giphy.gif">
        <h1 style="color: #ff4d6d;">REVERSE PSYCHOLOGY! ❤️</h1>
        <p>I knew you'd "No" your way into my heart.</p>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        let noSize = 1;

        // Make Yes button jump away
        const moveYes = () => {
            const x = Math.random() * (window.innerWidth - yesBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - yesBtn.offsetHeight);
            
            yesBtn.style.left = `${x}px`;
            yesBtn.style.top = `${y}px`;

            // Every time she tries to click Yes, make No bigger
            noSize += 0.4;
            noBtn.style.transform = `scale(${noSize})`;
        };

        yesBtn.addEventListener('mouseover', moveYes);
        yesBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            moveYes();
        });

        function accepted() {
            document.getElementById('main-content').style.display = 'none';
            document.getElementById('success-content').style.display = 'block';
            document.body.style.backgroundColor = '#ffb6c1';
        }
    </script>
</body>
</html>
