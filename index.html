<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Question for Amiwa</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background-color: #fce4ec;
      font-family: 'Courier New', Courier, monospace;
      overflow: hidden;
      text-align: center;
    }

    #main-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      height: 100%;
      justify-content: center;
    }

    /* Fixed Centering for Amiwa's Image */
    #amiwaImage {
      width: 280px;
      border-radius: 20px;
      margin-bottom: 20px;
      border: 4px solid white;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
      z-index: 5;
    }

    h1 {
      color: #333;
      z-index: 5;
      margin-bottom: 40px;
    }

    .button-wrapper {
      display: flex;
      gap: 30px;
      justify-content: center;
      align-items: center;
      position: relative;
      width: 100%;
      height: 100px;
    }

    button {
      padding: 15px 35px;
      font-size: 1.2rem;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
    }

    /* THE FIX: z-index 1000 ensures Yes is ALWAYS on top of No */
    #yesBtn {
      background-color: #4CAF50;
      color: white;
      z-index: 1000; 
      position: relative;
    }

    /* No grows but stays on a lower layer (z-index 10) */
    #noBtn {
      background-color: #ff4d4d;
      color: white;
      z-index: 10;
      position: relative;
      transition: transform 0.2s ease-out;
    }

    .success-content {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2000;
      background-color: black;
    }

    #roastImage {
      max-width: 320px;
      border: 5px solid white;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>
  <div id="main-content">
    <img id="amiwaImage" src="amiwa.jpg" alt="Amiwa">
    <h1>Amiwa, will you be my Valentine?</h1>

    <div class="button-wrapper">
      <button id="yesBtn">Yes</button>
      <button id="noBtn" onclick="accepted()">No</button>
    </div>
  </div>

  <div id="success-content" class="success-content">
    <img id="roastImage" src="amiwa.jpg" alt="Roast Image">
    <h1 style="color: #d32f2f; font-size: 3.5rem; margin: 0;">WOMP</h1>
    <p style="font-size: 1.5rem; font-weight: bold; padding: 0 20px; color: #fff;">
      you gonna die alone cause you so goddamn ugly u femboy
    </p>
  </div>

  <script>
    const yesBtn = document.getElementById('yesBtn');
    const noBtn = document.getElementById('noBtn');
    const successContent = document.getElementById('success-content');

    let noSize = 1;
    let yesAttempts = 0;

    const moveYes = () => {
      // Switches to absolute positioning once the user tries to click it
      yesBtn.style.position = 'absolute';
      
      const x = Math.random() * (window.innerWidth - yesBtn.offsetWidth);
      const y = Math.random() * (window.innerHeight - yesBtn.offsetHeight);

      yesBtn.style.left = `${x}px`;
      yesBtn.style.top = `${y}px`;

      yesAttempts++;
      
      // No button grows slightly bigger each time
      noSize += 0.5;
      noBtn.style.transform = `scale(${noSize})`;
    };

    yesBtn.addEventListener('mouseover', moveYes);
    yesBtn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      moveYes();
    });

    function accepted() {
      if (yesAttempts < 5) {
        alert("Nice try 😌 click the green one first");
        return;
      }
      successContent.style.display = 'flex';
    }
  </script>
</body>
</html>
